<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WELCOME USER</title>
<style>
body {
margin: 0;
background: black;
color: #660000;
font-family: monospace;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
flex-direction: column;
overflow: hidden;
position: relative;
}

/* Scary staring eyes in the corner */
.eyes-container {
position: absolute;
top: 40px;
right: 40px;
display: flex;
gap: 20px;
animation: blink 4s infinite;
}

.eye {
width: 30px;
height: 15px;
background: red;
border-radius: 50%;
box-shadow: 0 0 15px red;
position: relative;
}

.eye::after {
content: '';
position: absolute;
width: 8px;
height: 8px;
background: black;
border-radius: 50%;
top: 3px;
left: 11px;
}

h1 {
font-size: 36px;
letter-spacing: 5px;
color: #8b0000;
text-shadow: 0 0 8px rgba(255, 0, 0, 0.3);
margin-bottom: 10px;
}

p {
color: #444;
font-size: 16px;
margin-bottom: 30px;
letter-spacing: 2px;
}

.terminal-box {
background: #050000;
border: 1px solid #300;
padding: 40px;
box-shadow: 0 0 25px rgba(139, 0, 0, 0.15);
text-align: center;
}

input {
background: black;
border: 1px solid #500;
color: red;
padding: 12px;
font-family: monospace;
font-size: 18px;
text-align: center;
outline: none;
width: 250px;
margin-right: 10px;
}

button {
background: #200;
border: 1px solid #500;
color: red;
padding: 12px 24px;
font-family: monospace;
font-size: 18px;
cursor: pointer;
transition: 0.2s;
}

button:hover {
background: red;
color: black;
box-shadow: 0 0 10px red;
}

.error-flash {
animation: flashRed 0.3s;
}

@keyframes blink {
0%, 90%, 100% { transform: scaleY(1); }
95% { transform: scaleY(0.1); }
}

@keyframes flashRed {
0%, 100% { border-color: #500; }
50% { border-color: red; background: #200; }
}
</style>
</head>
<body>

<audio id="creepyMusic" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mp3">
</audio>

<div class="eyes-container">
<div class="eye"></div>
<div class="eye"></div>
</div>

<div class="terminal-box">
<h1>WELCOME USER...</h1>
<p>ACCESS REQUIRES IDENTIFICATION</p>

<input type="password" id="accessCode" placeholder="ENTER THE CODE..." autocomplete="off">
<button onclick="checkCode()">ENTER</button>
</div>

<script>
// Plays the silent creepy tune automatically on enter
window.addEventListener('DOMContentLoaded', () => {
    const music = document.getElementById('creepyMusic');
    music.volume = 0.3; // Low, eerie volume
    music.play().catch(err => console.log("Audio waiting for player interaction context."));
});

function checkCode() {
    const inputField = document.getElementById('accessCode');
    const code = inputField.value.trim();
    
    if (code === "codenameshishimanu") {
        location.href = 'database.html';
    } else {
        inputField.classList.add('error-flash');
        inputField.value = '';
        inputField.placeholder = "INVALID ACCESS KEY";
        setTimeout(() => {
            inputField.classList.remove('error-flash');
        }, 300);
    }
}

document.getElementById('accessCode').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        checkCode();
    }
});
</script>

</body>
</html>
