<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE ARCHIVE</title>
<style>
body {
  margin: 0;
  padding: 0;
  background: #050505;
  color: #00ff88;
  font-family: 'Courier New', monospace;
  min-height: 100vh;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 40px 20px;
}

.header {
  text-align: center;
  margin-bottom: 50px;
}

.title {
  font-size: 42px;
  color: #00ff88;
  text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff44;
  letter-spacing: 5px;
  animation: glitch 3s infinite;
}

@keyframes glitch {
  0%, 90%, 100% { transform: translate(0); }
  92% { transform: translate(-2px, 1px); }
  94% { transform: translate(2px, -1px); }
  96% { transform: translate(-1px, 2px); }
}

.subtitle {
  color: #006644;
  font-size: 14px;
  margin-top: 15px;
  letter-spacing: 2px;
}

.loading {
  text-align: center;
  color: #00aa66;
  font-size: 18px;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.entries {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-top: 30px;
}

.entry {
  background: rgba(0, 255, 136, 0.03);
  border: 1px solid #006644;
  padding: 25px;
  position: relative;
  transition: all 0.3s;
}

.entry:hover {
  border-color: #00ff88;
  box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
}

.entry-title {
  font-size: 20px;
  color: #00ff88;
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.entry-content {
  color: #00aa66;
  font-size: 16px;
  line-height: 1.6;
}

.entry-date {
  color: #004433;
  font-size: 12px;
  margin-top: 15px;
}

.scan-line {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 255, 136, 0.03) 2px,
    rgba(0, 255, 136, 0.03) 4px
  );
  z-index: 100;
}

.back-btn {
  display: block;
  margin: 40px auto 0;
  background: transparent;
  border: 1px solid #00ff88;
  color: #00ff88;
  padding: 12px 30px;
  font-size: 14px;
  font-family: 'Courier New', monospace;
  cursor: pointer;
  transition: all 0.3s;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.back-btn:hover {
  background: #00ff88;
  color: #000;
}
</style>
</head>
<body>

<div class="scan-line"></div>

<div class="container">
  <div class="header">
    <h1 class="title">THE ARCHIVE</h1>
    <p class="subtitle">RESTRICTED DATABASE - AUTHORIZED ACCESS ONLY</p>
  </div>

  <div id="entriesContainer" class="entries">
    <p class="loading">DECRYPTING DATA...</p>
  </div>

  <button class="back-btn" onclick="location.href='index.html'">RETURN</button>
</div>

<audio id="bgAudio" loop>
  <source src="https://assets.mixkit.co/active_storage/sfx/2523/2523-preview.mp3" type="audio/mpeg">
</audio>

<script>
const SUPABASE_URL = 'https://0ec90b57d6e95fcbda19832f.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJib2x0IiwicmVmIjoiMGVjOTBiNTdkNmU5NWZjYmRhMTk4MzJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg4ODE1NzQsImV4cCI6MTc1ODg4MTU3NH0.9I8-U0x86Ak8t2DGaIk0HfvTSLsAyzdnz-Nw00mMkKw';

const audio = document.getElementById('bgAudio');
audio.volume = 0.2;

document.addEventListener('click', () => {
  audio.play().catch(e => {});
}, { once: true });

async function loadSecrets() {
  try {
    const response = await fetch(`${SUPABASE_URL}/rest/v1/secrets_vault?select=*&is_visible=eq.true&order=created_at.desc`, {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
      }
    });

    const data = await response.json();
    renderEntries(data);
  } catch (error) {
    document.getElementById('entriesContainer').innerHTML = '<p style="color: #ff0000; text-align: center;">CONNECTION FAILED. THEY ARE WATCHING.</p>';
  }
}

function renderEntries(entries) {
  const container = document.getElementById('entriesContainer');

  if (entries.length === 0) {
    container.innerHTML = '<p style="color: #006644; text-align: center;">NO DATA FOUND</p>';
    return;
  }

  container.innerHTML = entries.map(entry => `
    <div class="entry">
      <div class="entry-title">${entry.title}</div>
      <div class="entry-content">${entry.content}</div>
      <div class="entry-date">LOGGED: ${new Date(entry.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</div>
    </div>
  `).join('');
}

loadSecrets();
</script>

</body>
</html>
