
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHO ARE YOU?</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
height:100vh;
font-family:monospace;
color:red;
}

img{
width:250px; /* Made smaller to fit the screen better */
animation:shake 0.08s infinite;
}

h1{
font-size:50px;
text-align:center;
animation:flicker 0.2s infinite;
}

.buttons{
margin-top:20px;
}

button{
background:black;
color:#00ff88;
border:1px solid #00ff88;
padding:15px 30px;
margin:10px;
cursor:pointer;
font-family:monospace;
font-size:18px;
}

button:hover{
background:#00ff88;
color:black;
}

@keyframes shake{
0%{transform:translate(2px,2px);}
25%{transform:translate(-2px,2px);}
50%{transform:translate(2px,-2px);}
75%{transform:translate(-2px,-2px);}
100%{transform:translate(0px,0px);}
}

@keyframes flicker{
50%{opacity:0.2;}
}
</style>
</head>

<body>

<audio autoplay>
<source src="scream.wav" type="audio/wav">
</audio>

</html>
